<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galera da Caneca — Novo Produto</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="pagina">
  <header class="cabecalho">
    <div class="cabecalho__barra">
      <div class="marca">
        <svg width="30" height="30" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="52" height="52" rx="12" fill="#C1832F"/>
          <path d="M15 16h16v18a3 3 0 0 1-3 3H18a3 3 0 0 1-3-3V16Z" stroke="#22303A" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M31 21h3a3 3 0 0 1 3 3v2a3 3 0 0 1-3 3h-3" stroke="#22303A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Galera da Caneca<span class="marca__linha2">Sistema de Vendas</span></span>
      </div>
      <nav class="nav-principal">
        <a href="dashboard.html">Dashboard</a>
        <a href="vendas.html">Vendas</a>
        <a href="clientes.html">Clientes</a>
        <a href="produtos.html" class="ativo somente-gerente">Produtos</a>
        <a href="vendedores.html" class="somente-gerente">Funcionários</a>
      </nav>
      <div class="cabecalho__usuario">
        <span class="crachá"><span class="crachá__ponto"></span><span data-usuario-nome></span> · <span data-usuario-perfil></span></span>
        <button class="btn-sair" data-acao="sair" type="button">Sair</button>
      </div>
    </div>
  </header>

  <main class="miolo">
    <div class="container">
      <p class="trilha"><a href="produtos.html">Produtos</a> / Novo produto</p>
      <div class="cabecalho-secao">
        <h1 data-titulo-form>Novo Produto</h1>
      </div>

      <form id="form-produto" class="form-caixa" novalidate>
        <input type="hidden" id="produtoId">

        <fieldset>
          <legend>Dados do produto</legend>

          <div class="campo">
            <label for="nome">Nome do Produto</label>
            <input type="text" id="nome" name="nome" placeholder="Ex.: Caneca Chopp 300ml" required>
            <span class="mensagem-erro"></span>
          </div>

          <div class="linha-campos">
            <div class="campo">
              <label for="preco">Preço (R$)</label>
              <input type="number" id="preco" name="preco" min="0.01" step="0.01" placeholder="Ex.: 29.90" required>
              <span class="mensagem-erro"></span>
            </div>
            <div class="campo">
              <label for="estoque">Quantidade em Estoque</label>
              <input type="number" id="estoque" name="estoque" min="0" step="1" placeholder="Ex.: 50" required>
              <span class="mensagem-erro"></span>
            </div>
          </div>
        </fieldset>

        <div class="acoes-form">
          <button type="submit" class="btn btn--primario">Salvar</button>
          <a href="produtos.html" class="btn btn--secundario">Cancelar</a>
        </div>
      </form>
    </div>
  </main>

  <footer class="rodape">Galera da Caneca &copy; 2026 — Projeto acadêmico, front-end sem conexão com banco de dados.</footer>
</div>

<script src="js/api.js"></script>
<script src="js/utilitarios.js"></script>
<script src="js/cabecalho.js"></script>
<script src="js/produtos.js"></script>
<script>inicializarFormularioProduto();</script>
</body>
</html>
