<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galera da Caneca — Vendas</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="pagina">
  <header class="cabecalho">
    <div class="cabecalho__barra">
      <div class="marca">
        <svg width="30" height="30" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="52" height="52" rx="12" fill="#C1832F"/>
          <path d="M15 16h16v18a3 3 0 0 1-3 3H18a3 3 0 0 1-3-3V16Z" stroke="#22303A" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M31 21h3a3 3 0 0 1 3 3v2a3 3 0 0 1-3 3h-3" stroke="#22303A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Galera da Caneca<span class="marca__linha2">Sistema de Vendas</span></span>
      </div>
      <nav class="nav-principal">
        <a href="dashboard.html">Dashboard</a>
        <a href="vendas.html" class="ativo">Vendas</a>
        <a href="clientes.html">Clientes</a>
        <a href="produtos.html" class="somente-gerente">Produtos</a>
        <a href="vendedores.html" class="somente-gerente">Funcionários</a>
      </nav>
      <div class="cabecalho__usuario">
        <span class="crachá"><span class="crachá__ponto"></span><span data-usuario-nome></span> · <span data-usuario-perfil></span></span>
        <button class="btn-sair" data-acao="sair" type="button">Sair</button>
      </div>
    </div>
  </header>

  <main class="miolo">
    <div class="container">
      <div class="cabecalho-secao">
        <div>
          <h1>Vendas</h1>
          <p class="subtitulo" data-contador-vendas>0 venda(s)</p>
        </div>
        <a href="venda-form.html" class="btn btn--primario">+ Nova Venda</a>
      </div>

      <div class="barra-filtros">
        <input type="search" id="busca-venda" placeholder="Buscar por cliente…" aria-label="Buscar venda por cliente">
        <select id="filtro-vendedor" aria-label="Filtrar por vendedor"></select>
      </div>

      <div class="tabela-caixa">
        <table class="tabela-dados" id="tabela-vendas">
          <thead>
            <tr>
              <th>Data</th>
              <th>Cliente</th>
              <th>Produto</th>
              <th class="numerico">Qtd.</th>
              <th class="numerico">Desconto</th>
              <th class="numerico">Total</th>
              <th>Vendedor(a)</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="rodape">Galera da Caneca &copy; 2026 — Projeto acadêmico, front-end sem conexão com banco de dados.</footer>
</div>

<script src="js/api.js"></script>
<script src="js/utilitarios.js"></script>
<script src="js/cabecalho.js"></script>
<script src="js/vendas.js"></script>
<script>inicializarListaVendas();</script>
</body>
</html>
